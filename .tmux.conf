# install: curl -fLo ~/.tmux.conf https://raw.githubusercontent.com/Monstertov/dotfiles/main/.tmux.conf
# deps: sudo apt install -y xclip wl-clipboard

# Custom settings:

# default shell
set-option -g default-shell /bin/bash

# remap prefix from 'C-b' to 'C-a' Only for user machines
#unbind C-b
#set-option -g prefix C-a
#bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# Enable mouse control
set -g mouse on

# Disable right-click context menu, restore right-click paste
unbind-key -T root MouseDown3Pane
bind-key -T root MouseDown3Pane run "tmux set-buffer \"$(xclip -o -selection clipboard 2>/dev/null || wl-paste 2>/dev/null)\" && tmux paste-buffer"

# don't rename windows automatically
set-option -g allow-rename off

# color
set -g default-terminal "screen-256color"

# Standard inverted selection highlight (no yellow)
set -wg mode-style bg=white,fg=black

# Vi copy mode
setw -g mode-keys vi

# OSC 52 clipboard support (works over SSH)
set -g set-clipboard on

# Copy to local clipboard via OSC 52 on mouse drag or 'y' key
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || wl-copy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || wl-copy"
